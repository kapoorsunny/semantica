apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "knowledge-explorer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "knowledge-explorer.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
