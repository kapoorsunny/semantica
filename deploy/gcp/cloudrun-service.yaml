apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: knowledge-explorer
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/knowledge-explorer:latest
          ports:
            - name: http1
              containerPort: 8000
          env:
            - name: ALLOWED_ORIGINS
              value: "*"
            - name: FALKORDB_HOST
              valueFrom:
                secretKeyRef:
                  name: falkordb-host
                  key: latest
            - name: FALKORDB_PORT
              valueFrom:
                secretKeyRef:
                  name: falkordb-port
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
